services:
  simpleinvoices:
    build: .
    ports:
      - "${SI_APP_PORT:-8888}:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SI_DB_HOST=${SI_DB_HOST}
      - SI_DB_PORT=${SI_DB_PORT}
      - SI_DB_USER=${SI_DB_USER}
      - SI_DB_PASSWORD=${SI_DB_PASSWORD}
      - SI_DB_NAME=${SI_DB_NAME}
      - SI_DATABASE_ADAPTER=${SI_DATABASE_ADAPTER}
      - SI_DATABASE_UTF8=${SI_DATABASE_UTF8}
      - SI_AUTHENTICATION_ENABLED=${SI_AUTHENTICATION_ENABLED}
      - SI_AUTHENTICATION_HTTP=${SI_AUTHENTICATION_HTTP}
      - SI_EXPORT_SPREADSHEET=${SI_EXPORT_SPREADSHEET}
      - SI_EXPORT_WORDPROCESSOR=${SI_EXPORT_WORDPROCESSOR}
      - SI_EXPORT_PDF_SCREENSIZE=${SI_EXPORT_PDF_SCREENSIZE}
      - SI_EXPORT_PDF_PAPERSIZE=${SI_EXPORT_PDF_PAPERSIZE}
      - SI_EXPORT_PDF_LEFTMARGIN=${SI_EXPORT_PDF_LEFTMARGIN}
      - SI_EXPORT_PDF_RIGHTMARGIN=${SI_EXPORT_PDF_RIGHTMARGIN}
      - SI_EXPORT_PDF_TOPMARGIN=${SI_EXPORT_PDF_TOPMARGIN}
      - SI_EXPORT_PDF_BOTTOMMARGIN=${SI_EXPORT_PDF_BOTTOMMARGIN}
      - SI_LOCAL_LOCALE=${SI_LOCAL_LOCALE}
      - SI_LOCAL_PRECISION=${SI_LOCAL_PRECISION}
      - SI_EMAIL_HOST=${SI_EMAIL_HOST}
      - SI_EMAIL_SMTP_AUTH=${SI_EMAIL_SMTP_AUTH}
      - SI_EMAIL_USERNAME=${SI_EMAIL_USERNAME}
      - SI_EMAIL_PASSWORD=${SI_EMAIL_PASSWORD}
      - SI_EMAIL_SMTPPORT=${SI_EMAIL_SMTPPORT}
      - SI_EMAIL_SECURE=${SI_EMAIL_SECURE}
      - SI_EMAIL_ACK=${SI_EMAIL_ACK}
      - SI_EMAIL_USE_LOCAL_SENDMAIL=${SI_EMAIL_USE_LOCAL_SENDMAIL}
      - SI_ENCRYPTION_DEFAULT_KEY=${SI_ENCRYPTION_DEFAULT_KEY}
      - SI_NONCE_KEY=${SI_NONCE_KEY}
      - SI_NONCE_TIMELIMIT=${SI_NONCE_TIMELIMIT}
      - SI_APP_NAME=${SI_APP_NAME}
      - SI_APP_LOGO=${SI_APP_LOGO}
      - SI_APP_WEBSITE=${SI_APP_WEBSITE}
      - SI_APP_WEBSITE_LABEL=${SI_APP_WEBSITE_LABEL}
      - SI_APP_FOOTER_LINK1_LABEL=${SI_APP_FOOTER_LINK1_LABEL}
      - SI_APP_FOOTER_LINK1_URL=${SI_APP_FOOTER_LINK1_URL}
      - SI_APP_FOOTER_LINK2_LABEL=${SI_APP_FOOTER_LINK2_LABEL}
      - SI_APP_FOOTER_LINK2_URL=${SI_APP_FOOTER_LINK2_URL}
      - SI_APP_FOOTER_LINK3_LABEL=${SI_APP_FOOTER_LINK3_LABEL}
      - SI_APP_FOOTER_LINK3_URL=${SI_APP_FOOTER_LINK3_URL}
      - SI_APP_FOOTER_LINK4_LABEL=${SI_APP_FOOTER_LINK4_LABEL}
      - SI_APP_FOOTER_LINK4_URL=${SI_APP_FOOTER_LINK4_URL}
      - SI_APP_FOOTER_TEXT=${SI_APP_FOOTER_TEXT}
      - SI_DEBUG_LEVEL=${SI_DEBUG_LEVEL}
      - SI_DEBUG_ERROR_REPORTING=${SI_DEBUG_ERROR_REPORTING}
      - SI_PHP_DATE_TIMEZONE=${SI_PHP_DATE_TIMEZONE}
      - SI_PHP_DISPLAY_STARTUP_ERRORS=${SI_PHP_DISPLAY_STARTUP_ERRORS}
      - SI_PHP_DISPLAY_ERRORS=${SI_PHP_DISPLAY_ERRORS}
      - SI_PHP_LOG_ERRORS=${SI_PHP_LOG_ERRORS}
      - SI_PHP_ERROR_LOG=${SI_PHP_ERROR_LOG}
      - SI_CONFIRM_DELETE_LINE_ITEM=${SI_CONFIRM_DELETE_LINE_ITEM}
      - SI_DB_WAIT_MAX=${SI_DB_WAIT_MAX}
    networks:
      - simpleinvoices-net

  db:
    image: yobasystems/alpine-mariadb:11.4.9
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - simpleinvoices-net
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u root -p\"$$MYSQL_ROOT_PASSWORD\" -e 'SELECT 1' || exit 1"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer: minimal DB UI (replaces phpMyAdmin; official image is small)
  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER}
      ADMINER_DEFAULT_USERNAME: ${ADMINER_DEFAULT_USERNAME}
      ADMINER_DEFAULT_PASSWORD: ${ADMINER_DEFAULT_PASSWORD}
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - simpleinvoices-net

volumes:
  mysql_data:

networks:
  simpleinvoices-net:
