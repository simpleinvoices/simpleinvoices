services:
  simpleinvoices:
    build: .
    ports:
      - "8888:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SI_DB_HOST=db
      - SI_DB_PORT=3306
      - SI_DB_USER=root
      - SI_DB_PASSWORD=rootpassword
      - SI_DB_NAME=simple_invoices
    networks:
      - simpleinvoices-net

  # MariaDB on Alpine (yobasystems image; multi-arch, well maintained)
  db:
    image: yobasystems/alpine-mariadb:11.4.9
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simple_invoices
      MYSQL_USER: simpleuser
      MYSQL_PASSWORD: simplepass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    #  - ./databases/mysql/Full_Simple_Invoices.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simpleinvoices-net
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u root -p\"$$MYSQL_ROOT_PASSWORD\" -e 'SELECT 1' || exit 1"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer: minimal DB UI (replaces phpMyAdmin; official image is small)
  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DEFAULT_USERNAME: root
      ADMINER_DEFAULT_PASSWORD: rootpassword
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - simpleinvoices-net

volumes:
  mysql_data:

networks:
  simpleinvoices-net:
