services:
  simpleinvoices:
    build: .
    ports:
      - "8888:80"
    depends_on:
      - mysql
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - SI_DB_HOST=mysql
      - SI_DB_PORT=3306
      - SI_DB_USER=root
      - SI_DB_PASSWORD=rootpassword
      - SI_DB_NAME=simple_invoices
    # No volume: app files are copied into the image at build time.
    # Rebuild image to pick up code changes: docker-compose build --no-cache simpleinvoices
    networks:
      - simpleinvoices-net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: simple_invoices
      MYSQL_USER: simpleuser
      MYSQL_PASSWORD: simplepass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./databases/mysql/Full_Simple_Invoices.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - simpleinvoices-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - simpleinvoices-net

volumes:
  mysql_data:

networks:
  simpleinvoices-net:
