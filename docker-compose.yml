services:
  simpleinvoices:
    build: .
    ports:
      - "${SI_APP_PORT:-8888}:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SI_DB_HOST=${SI_DB_HOST}
      - SI_DB_PORT=${SI_DB_PORT}
      - SI_DB_USER=${SI_DB_USER}
      - SI_DB_PASSWORD=${SI_DB_PASSWORD}
      - SI_DB_NAME=${SI_DB_NAME}
    networks:
      - simpleinvoices-net

  db:
    image: yobasystems/alpine-mariadb:11.4.9
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - simpleinvoices-net
    healthcheck:
      test: ["CMD-SHELL", "mariadb -u root -p\"$$MYSQL_ROOT_PASSWORD\" -e 'SELECT 1' || exit 1"]
      start_period: 30s
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer: minimal DB UI (replaces phpMyAdmin; official image is small)
  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER}
      ADMINER_DEFAULT_USERNAME: ${ADMINER_DEFAULT_USERNAME}
      ADMINER_DEFAULT_PASSWORD: ${ADMINER_DEFAULT_PASSWORD}
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - simpleinvoices-net

volumes:
  mysql_data:

networks:
  simpleinvoices-net:
